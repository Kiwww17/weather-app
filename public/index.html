<!DOCTYPE html>
<html lang="en" class="scrollbar-thin scrollbar-track-gray-900 scrollbar-thumb-gray-700">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Stylesheet -->
    <link rel="Stylesheet" href="./style.css">
    <!-- End Of Stylesheet -->
    <title>Weather App</title>
</head>

<body class="bg-gray-900">

    <!-- App wrapper -->
    <div class="flex flex-col gap-12 p-8 w-full h-fit justify-center items-center">

        

        
        <!-- Display -->
        <section
            class="w-fit h-fit lg:max-w-75 p-4 flex flex-col gap-8 justify-center items-center bg-linear-to-tl from-gray-800 via-blue-600 to-blue-400 rounded-lg drop-shadow-md drop-shadow-gray-400/65">
            <nav class="w-full h-fit flex flex-row gap-2 justify-between items-center">
                <div class="flex flex-col justify-center items-center gap-1 w-fit h-fit p-1  cursor-pointer"
                    id="hamburger">
                    <span class="w-6 h-1 bg-white rounded-sm"></span>
                    <span class="w-6 h-1 bg-white rounded-sm"></span>
                    <span class="w-6 h-1 bg-white rounded-sm"></span>
                </div>

                <!-- Form -->
                <form
                    class="flex flex-row lg:max-w-75 w-full h-fit  justify-center items-center gap-2 lg:mx-auto rounded-md transition-all duration-300 scale-0"
                    id="form">
                    <input type="text" id="city"
                        class="bg-gray-300/30 w-48 h-6 rounded-md font-semibold text-gray-900 appearance-none outline-0 border-0 p-2 focus:bg-gray-300"
                        placeholder="Enter City Name">
                    <button type="submit" id="btnSubmit"
                        class="w-6 h-6 flex p-1 justify-center items-center text-lg  bg-gray-300/30 rounded-full cursor-pointer active:opacity-90 active:scale-95">🔎</button>
                </form>
                <!-- End Of Form -->
            </nav>


            <header>
                <h1 class="text-3xl text-white font-bold text-center" id="displayCity"></h1>
                <h4 class="text-lg text-white font-semibold text-center" id="date"></h4>
            </header>

            <figure class="h-fit w-full -mt-12">
                <figure id="icon" class="flex justify-center">

                </figure>
                <p class="text-[18px] h-full w-full text-center text-gray-200 font-semibold" id="description"></p>
            </figure>

            <!-- Temp -->
            <div>
                <h3 class="text-2xl text-white font-bold text-center">Feels Like</h3>
                <h1 class="text-5xl text-white font-extrabold" id="displayTemp"></h1>
            </div>
            <!-- End Of Temp -->

            <!-- Data  -->
            <div class="flex flex-row w-full h-fit justify-center items-center">
                <!-- Sunrise -->
                <div class="flex flex-col w-fit h-fit justify-center items-center">
                    <figure class="w-1/3 h-1/3 flex justify-center items-center">
                        <img src="./icon/sun-regular-full.svg" alt="" class="w-full">
                    </figure>
                    <div class="w-1/3 h-1/3 flex justify-center items-center">
                        <p class="text-white text-sm font-semibold">SUNRISE</p>
                    </div>
                    <div class="w-1/3 h-1/3 flex justify-center items-center">
                        <p class="text-white text-sm font-semibold" id="displaySunrise"></p>
                    </div>
                </div>
                <!-- Sunrise -->

                <span class="w-2 h-12 bg-gray-200/50 block rounded-sm"></span>

                <!-- Wind -->
                <div class="flex flex-col w-fit h-fit justify-center items-center">
                    <figure class="w-1/3 h-1/3 flex justify-center items-center">
                        <img src="./icon/wind-solid-full.svg" alt="" class="w-full">
                    </figure>
                    <div class="w-1/3 h-1/3 flex justify-center items-center">
                        <p class="text-white text-sm font-semibold">WIND</p>
                    </div>
                    <div class="w-1/3 h-1/3 flex justify-center items-center">
                        <p class="text-white text-sm font-semibold" id="displayWind"></p>
                    </div>
                </div>
                <!-- Wind -->

                <span class="w-2 h-12 bg-gray-200/50 block rounded-sm"></span>

                <!-- temp -->
                <div class="flex flex-col w-fit h-fit justify-center items-center">
                    <figure class="w-1/3 h-1/3 flex justify-center items-center">
                        <img src="./icon/temperature-high-solid-full.svg" alt="" class="w-full">
                    </figure>
                    <div class="w-1/3 h-1/3 flex justify-center items-center">
                        <p class="text-white text-sm font-semibold">TEMP</p>
                    </div>
                    <div class="w-1/3 h-1/3 flex justify-center items-center">
                        <p class="text-white text-sm font-semibold" id="displayAbsTemp"></p>
                    </div>
                </div>
                <!-- temp -->


            </div>
            <!-- End Of Data -->
        </section>
        <!-- End Of Display -->


    </div>
    <!-- End Of App wrapper -->

    <script src="./main.js"></script>
</body>

</html>
